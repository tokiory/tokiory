# Top navigation/status panel with powerlevel-style tabs
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 24
set -g status-right-length 96

set -g status-style "bg=default,fg=colour252"
set -g message-style "bg=colour236,fg=colour223"
set -g message-command-style "bg=colour236,fg=colour223"
set -g mode-style "bg=colour179,fg=colour236,bold"

set -g status-left "#[fg=colour179,bg=default,bold] #S "
set -g status-right "#[fg=colour179,bg=default,bold] #(git -C \"#{pane_current_path}\" branch --show-current 2>/dev/null || echo '-') | %H:%M "

set -g window-status-separator ""
set -g window-status-format "#[fg=colour250,bg=default] #I:#W "
set -g window-status-current-format "#[fg=colour179,bg=default,bold] #I:[#W] "
