# Cross-platform clipboard command (macOS + Linux)
set -g @clipboard_copy_command "if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -in; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi"

# Yank selection to system clipboard and exit copy mode
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@clipboard_copy_command}"
