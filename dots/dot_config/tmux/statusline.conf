# Top navigation/status panel with powerlevel-style tabs
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-left-length 28
set -g status-right-length 72

set -g status-style "bg=colour236,fg=colour252"
set -g message-style "bg=colour236,fg=colour223"
set -g message-command-style "bg=colour236,fg=colour223"
set -g mode-style "bg=colour179,fg=colour236,bold"

set -g status-left "#[fg=colour223,bg=colour236,bold] 🤓 tokiory's place #[fg=colour244,bg=colour236,nobold]| #[fg=colour252,bg=colour236]#S "
set -g status-right "#[fg=colour244,bg=colour236]#H #[fg=colour180,bg=colour236,bold]%Y-%m-%d %H:%M "

set -g window-status-separator ""
set -g window-status-format " #[fg=colour179,bg=colour236]> #[fg=colour250,bg=colour236]#I #W"
set -g window-status-current-format " #[fg=colour179,bg=colour236,bold]> #[fg=colour236,bg=colour179,bold][#I #W]"
